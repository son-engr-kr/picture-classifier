name: Build macOS app

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.1.1) — used for filenames and Info.plist'
        required: true

jobs:
  build:
    name: macOS arm64 .app + DMG
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref }}

      - name: Resolve version
        id: ver
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Set up uv
        uses: astral-sh/setup-uv@v3
        with:
          enable-cache: true

      - name: Install Python and project deps
        run: uv sync --frozen

      - name: Build .app with PyInstaller
        env:
          APP_VERSION: ${{ steps.ver.outputs.version }}
        run: |
          uv run --with pyinstaller pyinstaller \
            --noconfirm --clean \
            packaging/picture-classifier.spec

      - name: Verify .app launches its CLI
        run: |
          APP="dist/Picture Classifier.app"
          test -d "$APP"
          "$APP/Contents/MacOS/picture-classifier" --help | head -3

      - name: Create DMG
        run: |
          DMG="dist/Picture-Classifier-${{ steps.ver.outputs.tag }}-macos-arm64.dmg"
          # Use a temporary read-write image so we can drop a Applications symlink.
          STAGING=$(mktemp -d)
          cp -R "dist/Picture Classifier.app" "$STAGING/"
          ln -s /Applications "$STAGING/Applications"
          hdiutil create \
            -volname "Picture Classifier" \
            -srcfolder "$STAGING" \
            -ov -format UDZO \
            "$DMG"
          ls -lh "$DMG"

      - name: Upload to GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: dist/Picture-Classifier-*.dmg
          fail_on_unmatched_files: true

      - name: Upload artifact (workflow_dispatch fallback)
        if: github.event_name == 'workflow_dispatch'
        uses: actions/upload-artifact@v4
        with:
          name: picture-classifier-${{ steps.ver.outputs.tag }}-macos-arm64
          path: dist/Picture-Classifier-*.dmg
          retention-days: 14
