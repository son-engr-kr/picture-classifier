name: Update Homebrew tap

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.1.1)'
        required: true

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Verify TAP_TOKEN secret is set
        env:
          TAP_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          if [ -z "$TAP_TOKEN" ]; then
            echo "::error::TAP_TOKEN secret is not set. See README 'Releasing' section."
            exit 1
          fi

      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Compute source tarball sha256
        id: sha
        run: |
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${{ steps.tag.outputs.tag }}.tar.gz"
          # GitHub may take a moment to expose the auto-generated tarball.
          SHA=""
          for i in 1 2 3 4 5; do
            if SHA=$(curl -fsSL "$URL" | shasum -a 256 | cut -d' ' -f1) && [ -n "$SHA" ]; then
              break
            fi
            echo "tarball not ready, retry $i…"
            sleep 5
          done
          [ -n "$SHA" ] || { echo "failed to fetch tarball at $URL"; exit 1; }
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Update formula in tap repo
        env:
          GH_TOKEN: ${{ secrets.TAP_TOKEN }}
          TAG: ${{ steps.tag.outputs.tag }}
          VERSION: ${{ steps.tag.outputs.version }}
          SHA: ${{ steps.sha.outputs.sha }}
        run: |
          set -eu
          # Embed the token in the remote URL so `git push` is authenticated.
          git clone "https://x-access-token:${GH_TOKEN}@github.com/son-engr-kr/homebrew-picture-classifier.git" tap
          cd tap
          sed -i -E "s|/refs/tags/v[^\"]+\.tar\.gz|/refs/tags/${TAG}.tar.gz|" Formula/picture-classifier.rb
          sed -i -E "s|sha256 \"[a-f0-9]+\"|sha256 \"${SHA}\"|" Formula/picture-classifier.rb

          if git diff --quiet; then
            echo "Formula already up to date for ${TAG}"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/picture-classifier.rb
          git commit -m "picture-classifier ${VERSION}"
          git push
