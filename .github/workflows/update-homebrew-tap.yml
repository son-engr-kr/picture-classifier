name: Update Homebrew tap

on:
  push:
    tags: ['v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Version tag (e.g. v0.1.1)'
        required: true

jobs:
  update-tap:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve tag
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag || github.ref_name }}"
          echo "tag=$TAG" >> "$GITHUB_OUTPUT"
          echo "version=${TAG#v}" >> "$GITHUB_OUTPUT"

      - name: Compute source tarball sha256
        id: sha
        run: |
          URL="https://github.com/${{ github.repository }}/archive/refs/tags/${{ steps.tag.outputs.tag }}.tar.gz"
          # GitHub may take a moment to expose the auto-generated tarball;
          # poll briefly so a back-to-back tag+workflow run still succeeds.
          for i in 1 2 3 4 5; do
            SHA=$(curl -fsSL "$URL" | shasum -a 256 | cut -d' ' -f1) && break
            echo "tarball not ready yet, retry $i…"
            sleep 5
          done
          [ -n "$SHA" ] || { echo "failed to fetch tarball" >&2; exit 1; }
          echo "sha=$SHA" >> "$GITHUB_OUTPUT"

      - name: Update formula in tap repo
        env:
          GH_TOKEN: ${{ secrets.TAP_TOKEN }}
        run: |
          set -eu
          TAG="${{ steps.tag.outputs.tag }}"
          VERSION="${{ steps.tag.outputs.version }}"
          SHA="${{ steps.sha.outputs.sha }}"

          gh repo clone son-engr-kr/homebrew-picture-classifier tap
          cd tap

          python3 - <<EOF
import re, pathlib
p = pathlib.Path("Formula/picture-classifier.rb")
src = p.read_text()
src = re.sub(r'/refs/tags/v[^"]+\.tar\.gz', f'/refs/tags/$TAG.tar.gz', src)
src = re.sub(r'sha256 "[a-f0-9]+"', f'sha256 "$SHA"', src)
p.write_text(src)
EOF

          if git diff --quiet; then
            echo "Formula already up to date for $TAG"
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add Formula/picture-classifier.rb
          git commit -m "picture-classifier $VERSION"
          git push
